# MacBook8,1 — expose the CS4208 TDM speaker PCM (card PCH, device 2) as an
# event-driven WirePlumber node so it survives the cold-boot timing race that
# killed the old static pipewire context.objects adapter.
#
# ACP/UCM does not know about the custom 4-channel TDM speaker PCM (device 2),
# so we switch this card to raw-PCM mode (api.alsa.use-acp = false). That makes
# WirePlumber create one node per PCM device:
#   device 0 playback -> analog/headphone   (kept)
#   device 0 capture  -> internal mic        (kept)
#   device 1 playback -> CS4208 Digital/SPDIF (DISABLED: shares converter node
#                        0x0a with device 2 and clobbers the speaker stream tag;
#                        no physical SPDIF jack exists)
#   device 2 playback -> CS4208 Speaker (TDM) -> renamed MacBook_Speaker_Raw,
#                        the node the EQ filter chain (MacBook_Speaker_DSP_Out)
#                        targets. 4ch S16LE 44100 FL FR RL RR.
monitor.alsa.rules = [
  {
    matches = [ { device.name = "alsa_card.pci-0000_00_1b.0" } ]
    actions = { update-props = { api.alsa.use-acp = false } }
  }
  {
    # device 1 = SPDIF/Digital — never expose it (tag clobber, no jack)
    matches = [ { object.path = "alsa:pcm:PCH:1:playback" } ]
    actions = { update-props = { node.disabled = true } }
  }
  {
    # device 2 = TDM speaker — this is the sink the EQ chain feeds
    matches = [ { object.path = "alsa:pcm:PCH:2:playback" } ]
    actions = {
      update-props = {
        node.name                       = "MacBook_Speaker_Raw"
        node.description                = "MacBook Speaker (Raw)"
        audio.format                    = "S16LE"
        audio.rate                      = 44100
        audio.channels                  = 4
        audio.position                  = [ FL FR RL RR ]
        api.alsa.period-size            = 1024
        api.alsa.headroom               = 1024
        node.pause-on-idle              = false
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
