PACKAGE_NAME="macbook12-audio"
PACKAGE_VERSION="0.1"

# All three modules are built by the PRE_BUILD helper (in BUILD_ONLY mode so it
# only compiles and leaves installation to DKMS). MAKE[0] is a no-op because the
# real build happens in PRE_BUILD, which downloads the matching kernel source,
# applies the MacBook8,1 patches, and builds each .ko into the build/ tree.
PRE_BUILD="dkms_build.sh $kernelver"
MAKE[0]="true"
CLEAN="rm -rf build"

# (C) cs420x: EFI coef image + TDM prepare sync-dance fix
BUILT_MODULE_NAME[0]="snd-hda-codec-cs420x"
BUILT_MODULE_LOCATION[0]="build/hda/codecs/cirrus"
DEST_MODULE_LOCATION[0]="/kernel/extra"

# (D) generic: CS4208 input-path + init_digital skip (clock-latch fix)
BUILT_MODULE_NAME[1]="snd-hda-codec-generic"
BUILT_MODULE_LOCATION[1]="build/hda/genmod"
DEST_MODULE_LOCATION[1]="/kernel/extra"

# (A) intel/azx: no-reset attach to the live EFI link
BUILT_MODULE_NAME[2]="snd-hda-intel"
BUILT_MODULE_LOCATION[2]="build/hda/controllers"
DEST_MODULE_LOCATION[2]="/kernel/extra"

AUTOINSTALL="yes"
