# NOTE (Option B WIP): the static `context.objects` api.alsa.pcm.sink adapter
# that created MacBook_Speaker_Raw here has been removed. The raw sink is now
# created event-driven by WirePlumber (raw-PCM mode on the PCH card) so it
# survives the cold-boot timing race. This file now only defines the EQ chain.

context.modules = [
    # macOS layout100 EQ with preamp gain, stereo→4ch
    {   name = libpipewire-module-filter-chain
        args = {
            node.name        = "MacBook_Speaker"
            node.description = "MacBook Speaker (EQ)"
            media.class      = "Audio/Sink"
            priority.session = 1100
            filter.graph = {
                nodes = [
                    # Preamp +15dB to compensate EQ cuts
                    { type = builtin  name = preL     label = bq_highshelf
                      control = { "Freq" = 20.0 "Q" = 0.707 "Gain" = 10.0 } }
                    { type = builtin  name = preR     label = bq_highshelf
                      control = { "Freq" = 20.0 "Q" = 0.707 "Gain" = 10.0 } }

                    # --- LEFT CHANNEL ---
                    { type = builtin  name = L_hpf1   label = bq_highpass
                      control = { "Freq" = 134.0 "Q" = 0.707 } }
                    { type = builtin  name = L_hpf2   label = bq_highpass
                      control = { "Freq" = 137.0 "Q" = 0.707 } }
                    { type = builtin  name = L_peq1   label = bq_peaking
                      control = { "Freq" = 258.0 "Q" = 0.79 "Gain" = 4.0 } }
                    { type = builtin  name = L_peq2   label = bq_peaking
                      control = { "Freq" = 365.0 "Q" = 5.05 "Gain" = -2.0 } }
                    { type = builtin  name = L_peq3   label = bq_peaking
                      control = { "Freq" = 1800.0 "Q" = 2.32 "Gain" = -3.5 } }
                    { type = builtin  name = L_hsf    label = bq_highshelf
                      control = { "Freq" = 265.0 "Q" = 1.65 "Gain" = -3.0 } }
                    { type = builtin  name = L_peq4   label = bq_peaking
                      control = { "Freq" = 875.0 "Q" = 0.62 "Gain" = -10.0 } }
                    { type = builtin  name = L_peq5   label = bq_peaking
                      control = { "Freq" = 12800.0 "Q" = 0.56 "Gain" = -14.0 } }
                    { type = builtin  name = L_peq6   label = bq_peaking
                      control = { "Freq" = 3000.0 "Q" = 0.96 "Gain" = -5.0 } }
                    { type = builtin  name = L_peq7   label = bq_peaking
                      control = { "Freq" = 4870.0 "Q" = 2.96 "Gain" = -4.0 } }
                    { type = builtin  name = L_copyFL label = copy }
                    { type = builtin  name = L_copyRL label = copy }

                    # --- RIGHT CHANNEL ---
                    { type = builtin  name = R_hpf1   label = bq_highpass
                      control = { "Freq" = 134.0 "Q" = 0.707 } }
                    { type = builtin  name = R_hpf2   label = bq_highpass
                      control = { "Freq" = 137.0 "Q" = 0.707 } }
                    { type = builtin  name = R_peq1   label = bq_peaking
                      control = { "Freq" = 258.0 "Q" = 0.79 "Gain" = 4.0 } }
                    { type = builtin  name = R_peq2   label = bq_peaking
                      control = { "Freq" = 365.0 "Q" = 5.05 "Gain" = -2.0 } }
                    { type = builtin  name = R_peq3   label = bq_peaking
                      control = { "Freq" = 1800.0 "Q" = 2.32 "Gain" = -3.5 } }
                    { type = builtin  name = R_hsf    label = bq_highshelf
                      control = { "Freq" = 265.0 "Q" = 1.65 "Gain" = -3.0 } }
                    { type = builtin  name = R_peq4   label = bq_peaking
                      control = { "Freq" = 875.0 "Q" = 0.62 "Gain" = -10.0 } }
                    { type = builtin  name = R_peq5   label = bq_peaking
                      control = { "Freq" = 12800.0 "Q" = 0.56 "Gain" = -14.0 } }
                    { type = builtin  name = R_peq6   label = bq_peaking
                      control = { "Freq" = 3000.0 "Q" = 0.96 "Gain" = -5.0 } }
                    { type = builtin  name = R_peq7   label = bq_peaking
                      control = { "Freq" = 4870.0 "Q" = 2.96 "Gain" = -4.0 } }
                    { type = builtin  name = R_copyFR label = copy }
                    { type = builtin  name = R_copyRR label = copy }
                ]
                links = [
                    # Left: preamp → HPF → EQ → split
                    { output = "preL:Out"     input = "L_hpf1:In" }
                    { output = "L_hpf1:Out"   input = "L_hpf2:In" }
                    { output = "L_hpf2:Out"   input = "L_peq1:In" }
                    { output = "L_peq1:Out"   input = "L_peq2:In" }
                    { output = "L_peq2:Out"   input = "L_peq3:In" }
                    { output = "L_peq3:Out"   input = "L_hsf:In" }
                    { output = "L_hsf:Out"    input = "L_peq4:In" }
                    { output = "L_peq4:Out"   input = "L_peq5:In" }
                    { output = "L_peq5:Out"   input = "L_peq6:In" }
                    { output = "L_peq6:Out"   input = "L_peq7:In" }
                    { output = "L_peq7:Out"   input = "L_copyFL:In" }
                    { output = "L_peq7:Out"   input = "L_copyRL:In" }
                    # Right: preamp → HPF → EQ → split
                    { output = "preR:Out"     input = "R_hpf1:In" }
                    { output = "R_hpf1:Out"   input = "R_hpf2:In" }
                    { output = "R_hpf2:Out"   input = "R_peq1:In" }
                    { output = "R_peq1:Out"   input = "R_peq2:In" }
                    { output = "R_peq2:Out"   input = "R_peq3:In" }
                    { output = "R_peq3:Out"   input = "R_hsf:In" }
                    { output = "R_hsf:Out"    input = "R_peq4:In" }
                    { output = "R_peq4:Out"   input = "R_peq5:In" }
                    { output = "R_peq5:Out"   input = "R_peq6:In" }
                    { output = "R_peq6:Out"   input = "R_peq7:In" }
                    { output = "R_peq7:Out"   input = "R_copyFR:In" }
                    { output = "R_peq7:Out"   input = "R_copyRR:In" }
                ]
                inputs  = [ "preL:In" "preR:In" ]
                outputs = [ "L_copyFL:Out" "R_copyFR:Out" "L_copyRL:Out" "R_copyRR:Out" ]
            }
            capture.props = {
                media.class    = "Audio/Sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name         = "MacBook_Speaker_DSP_Out"
                media.class       = "Stream/Output/Audio"
                audio.channels    = 4
                audio.position    = [ FL FR RL RR ]
                node.target       = "MacBook_Speaker_Raw"
            }
        }
    }
]
