# MacBook8,1 CS4208 enumeration fix.
#
# The patched no-reset azx attaches to the running EFI link WITHOUT a link
# reset. With the default CORB/RIRB DMA command ring, that attach is flaky:
# the un-link-reset codec returns "spurious response 0x0:0x0", azx times out,
# and a LATE fallback to single_cmd inherits an already-wedged link
# ("cannot read sub nodes for FG 0x1085" -> "no codecs initialized").
#
# efi_recover + the heal scripts are 100% reliable on this SAME codec because
# they use the MMIO immediate-command interface (ICOI/ICII/ICIS), never
# CORB/RIRB. Forcing single_cmd=1 here makes azx use that immediate-command
# path FROM THE FIRST VERB at boot — before CORB/RIRB can wedge the link.
#
# --- power_save=0: keep the codec in D0, never runtime-suspend ---------------
# The CS4208 class-D speaker amp rails (GPIO4/GPIO5) are set ONCE by EFI and the
# driver deliberately never re-drives them (cs420x.c cs4208_fixup_mb81). A
# runtime-PM D3 cycle disturbs those rails and nothing restores them on the
# D0 resume: the clock recovers (coef 0x1f=0x0) but the amp stays dead -> SILENCE.
# The winning efi_patched_test run only worked because it played immediately,
# before the codec could suspend. Pinning power_save=0 keeps the EFI amp powered
# continuously, exactly like that run.
#
# Install:  sudo cp mb81-singlecmd.conf /etc/modprobe.d/  && sudo reboot
options snd_hda_intel single_cmd=1 power_save=0
